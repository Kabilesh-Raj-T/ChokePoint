name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  quality:
    name: Quality (${{ matrix.os }}, Python ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: ["ubuntu-latest", "windows-latest", "macos-latest"]
        python-version: ["3.12", "3.13"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --frozen --python ${{ matrix.python-version }}

      - name: Run pre-commit hooks
        run: uv run pre-commit run --all-files

      - name: Smoke editable install
        run: uv run python scripts/smoke_install.py --editable

      - name: Check formatting
        run: uv run black --check src tests scripts

      - name: Lint
        run: uv run ruff check src tests scripts

      - name: Type check
        run: uv run mypy

      - name: Test
        run: uv run pytest -q

      - name: Build package
        run: uv build

      - name: Smoke install built distributions
        run: uv run python scripts/smoke_install.py --wheel --sdist
